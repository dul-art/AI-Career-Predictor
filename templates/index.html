<!DOCTYPE html>
<html>
<head>

<title>AI Career Predictor</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3");
    background-size:cover;
}

.box{

    width:420px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px black;
}


h1{
    text-align:center;
    color:#6a11cb;
}


input{

    width:95%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:1px solid gray;
}


button{

    width:100%;
    padding:15px;
    background:linear-gradient(45deg,#2575fc,#6a11cb);
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}


</style>


</head>


<body>


<div class="box">


<h1>🚀 AI Career Predictor</h1>


<form action="/predict" method="POST">


<label>Python Skill(0-10)</label>
<input type="number" name="Python" autofocus required>


<label>Java Skill(0-10)</label>
<input type="number" name="Java"  required>


<label>SQL Skill(0-10)</label>
<input type="number" name="SQL" required>


<label>Communication(0-10)</label>
<input type="number" name="Communication" required>


<label>Leadership(0-10)</label>
<input type="number" name="Leadership" required>


<label>Mathematics(0-10)</label>
<input type="number" name="Mathematics" required>


<label>Experience</label>
<input type="number" name="Experience"  required>


<label>Education(0-5)</label>
<input type="number" name="Education" required>


<button>
Next ➡️
</button>


</form>


</div>


</body>

</html>
